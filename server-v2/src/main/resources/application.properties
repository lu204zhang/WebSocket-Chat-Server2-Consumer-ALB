# RabbitMQ (local default; override for EC2)
spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest
app.rabbitmq.pool-size=10
app.rabbitmq.message-ttl-ms=60000
app.rabbitmq.queue-max-length=1000
app.server.id=
app.circuit-breaker.failure-threshold=5
app.circuit-breaker.open-duration-seconds=30